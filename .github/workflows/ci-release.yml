name: CI Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package Validation
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tuist
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Check Tuist
        run: tuist version

      - name: Check whitespace
        run: git diff --check

      - name: Test
        run: make test

      - name: Validate unsigned package
        env:
          PACKAGE_RELEASE_ALLOW_UNSIGNED: "1"
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('ci-{0}', github.sha) }}
        run: make package-release
