arguments:
  - scripts/muter_xcodebuild.sh
  - -project
  - CodexPill.xcodeproj
  - -scheme
  - CodexPill
  - -configuration
  - Debug
  - -destination
  - platform=macOS
  - -derivedDataPath
  - build/DerivedData/mutation
  - PRODUCT_BUNDLE_IDENTIFIER=com.raphhgg.codexpill.staging
  - test
executable: /bin/bash
exclude:
  - .build
  - build
  - DerivedData
  - Derived
  - Tuist/.build
  - CodexPill.xcodeproj
  - CodexPill.xcworkspace
  - Tests
  - Resources
  - Tools
  - Scripts
  - scripts
  - Package.swift
  - Sources/App
  - Sources/Platform
  - Sources/MenuBar
  - Sources/Features/Accounts/Presentation
  - Sources/Features/Hosts/Presentation
excludeCalls: []
testSuiteTimeout: 300
